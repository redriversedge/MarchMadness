<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">
  <title>March Madness 2026</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="/css/madness.css">
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header id="app-header">
      <div class="header-left">
        <span class="header-title">March Madness 2026</span>
      </div>
      <div class="header-right">
        <span id="last-updated"></span>
        <button class="admin-btn" onclick="App.toggleAdmin()" title="Admin">&#9881;</button>
      </div>
    </header>

    <!-- TAB CONTENT -->
    <main id="tab-content">
      <div id="tab-dashboard"></div>
      <div id="tab-bracket" style="display:none;"></div>
    </main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav"></nav>
  </div>

  <!-- ADMIN OVERLAY -->
  <div id="admin-overlay" onclick="if(event.target===this)App.toggleAdmin()">
    <div class="admin-card">
      <div class="admin-header">
        <h2>Admin Panel</h2>
        <button class="close-btn" onclick="App.toggleAdmin()">&times;</button>
      </div>
      <div id="admin-content"></div>
    </div>
  </div>

  <!-- Scripts (order matters) -->
  <script src="/js/config.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/scoring.js"></script>
  <script src="/js/draft.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/bracket.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
